[build]
  command = "npm run build && npx wrangler pages deploy .svelte-kit/cloudflare --project-name=opensansorroboto --branch=main --commit-dirty=true"
  publish = ".svelte-kit/cloudflare"

[build.environment]
  NODE_VERSION = "22"

# Prevent Netlify from serving the build output — Cloudflare Pages is the CDN
[build.processing]
  skip_processing = true
