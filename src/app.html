<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Open Sans or Roboto? — They look the same. Do they?</title>

		<!-- Primary SEO -->
		<meta name="description" content="Two typefaces walk into a browser. Can you tell them apart? Most designers swear they can. Most designers are wrong. Find out which side you're on." />
		<meta name="keywords" content="open sans, roboto, typography quiz, font game, graphic design, typeface, designer challenge" />
		<meta name="author" content="Open Sans or Roboto" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://opensansorroboto.com/" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://opensansorroboto.com/" />
		<meta property="og:title" content="Open Sans or Roboto?" />
		<meta property="og:description" content="Two typefaces walk into a browser. Can you tell them apart? Most designers are wrong." />
		<meta property="og:image" content="https://opensansorroboto.com/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:site_name" content="Open Sans or Roboto?" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://opensansorroboto.com/" />
		<meta name="twitter:title" content="Open Sans or Roboto?" />
		<meta name="twitter:description" content="Two typefaces walk into a browser. Can you tell them apart? Most designers are wrong." />
		<meta name="twitter:image" content="https://opensansorroboto.com/og-image.png" />

		<!-- Theme & PWA -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=Lato:ital,wght@0,400;0,700;1,400&family=Montserrat:ital,wght@0,400;0,500;0,700;1,400&family=Open+Sans:ital,wght@0,400;0,500;0,700;1,400&family=Poppins:ital,wght@0,400;0,500;0,700;1,400&family=Roboto:ital,wght@0,400;0,500;0,700;1,400&family=Source+Sans+3:ital,wght@0,400;0,600;1,400&display=swap"
			rel="stylesheet"
		/>
		<!-- Eagerly warm up all game fonts so they are ready before the countdown starts -->
		<script>
			(function () {
				if (!('fonts' in document)) return;
				var weights = ['400', '500', '700'];
				var families = [
					'Open Sans',
					'Roboto',
					'Lato',
					'Montserrat',
					'Poppins',
					'Inter',
					'Source Sans 3'
				];
				var phrases = ['Open Sans or Roboto?', 'Aa Bb Cc'];
				families.forEach(function (family) {
					weights.forEach(function (weight) {
						phrases.forEach(function (text) {
							document.fonts.load(weight + ' 48px "' + family + '"', text);
						});
					});
				});
			})();
		</script>
		<style>
			:root {
				--bg: #fff;
				--fg: #000;
				--fg-muted: #999;
				--fg-subtle: #bbb;
				--border: #d0d0d0;
				--surface: #f8f8f8;
				--surface-hover: #f0f0f0;
			}
			[data-theme="dark"] {
				--bg: #0a0a0a;
				--fg: #f0f0f0;
				--fg-muted: #888;
				--fg-subtle: #555;
				--border: #2a2a2a;
				--surface: #161616;
				--surface-hover: #222;
			}
			html, body {
				background: var(--bg);
				color: var(--fg);
			}
			/* CookieYes banner button overrides */
			.cky-btn {
				background-color: #000 !important;
				border-color: #000 !important;
				color: #fff !important;
			}
			.cky-btn-customize {
				background-color: transparent !important;
				color: #000 !important;
				border-color: #000 !important;
			}
		</style>
		<script id="cookieyes" type="text/javascript" src="https://cdn-cookieyes.com/client_data/c37ab71d295d358f979ea5582186dd56/script.js"></script>
		<script defer src="https://cloud.umami.is/script.js" data-website-id="041b009d-a77c-4c33-a14d-6f570d5cb012" data-domains="opensansorroboto.com"></script>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
