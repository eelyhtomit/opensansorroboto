<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>Open Sans or Roboto? — They look the same. Do they?</title>

		<!-- Primary SEO -->
		<meta name="description" content="Two typefaces walk into a browser. Can you tell them apart? Most designers swear they can. Most designers are wrong. Find out which side you're on." />
		<meta name="keywords" content="open sans, roboto, typography quiz, font game, graphic design, typeface, designer challenge" />
		<meta name="author" content="Open Sans or Roboto" />
		<meta name="robots" content="index, follow" />
		<link rel="canonical" href="https://opensansorroboto.com/" />

		<!-- Open Graph / Facebook -->
		<meta property="og:type" content="website" />
		<meta property="og:url" content="https://opensansorroboto.com/" />
		<meta property="og:title" content="Open Sans or Roboto? — They look the same. Do they?" />
		<meta property="og:description" content="Two typefaces walk into a browser. Can you tell them apart? Most designers swear they can. Most designers are wrong. Find out which side you're on." />
		<meta property="og:image" content="https://opensansorroboto.com/og-image.png" />
		<meta property="og:image:width" content="1200" />
		<meta property="og:image:height" content="630" />
		<meta property="og:site_name" content="Open Sans or Roboto?" />
		<meta property="og:locale" content="en_US" />

		<!-- Twitter Card -->
		<meta name="twitter:card" content="summary_large_image" />
		<meta name="twitter:url" content="https://opensansorroboto.com/" />
		<meta name="twitter:title" content="Open Sans or Roboto? — They look the same. Do they?" />
		<meta name="twitter:description" content="Two typefaces walk into a browser. Can you tell them apart? Most designers swear they can. Most designers are wrong. Find out which side you're on." />
		<meta name="twitter:image" content="https://opensansorroboto.com/og-image.png" />

		<!-- Theme & PWA -->
		<meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
		<meta name="theme-color" content="#0a0a0a" media="(prefers-color-scheme: dark)" />

		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
		<link
			href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=Lato:wght@400;700&family=Montserrat:wght@400;500&family=Open+Sans:wght@400;500&family=Poppins:wght@400;500&family=Roboto:wght@400;500&family=Source+Sans+Pro:wght@400;600&display=swap"
			rel="stylesheet"
		/>
		<style>
			:root {
				--bg: #fff;
				--fg: #000;
				--fg-muted: #999;
				--fg-subtle: #bbb;
				--border: #d0d0d0;
				--surface: #f8f8f8;
				--surface-hover: #f0f0f0;
			}
			[data-theme="dark"] {
				--bg: #0a0a0a;
				--fg: #f0f0f0;
				--fg-muted: #888;
				--fg-subtle: #555;
				--border: #2a2a2a;
				--surface: #161616;
				--surface-hover: #222;
			}
			html, body {
				background: var(--bg);
				color: var(--fg);
			}
		</style>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>
